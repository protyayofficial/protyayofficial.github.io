<nav class="nav-glass sticky top-0 z-50 shadow-xl">
  <style>
    .nav-glass {
      background: rgba(10, 15, 30, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(20, 184, 166, 0.2);
    }
    .gradient-text {
      background: linear-gradient(135deg, #14b8a6 0%, #eab308 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
  <div class="max-w-7xl mx-auto px-6 py-4">
    <div class="flex items-center justify-between">
      <a
        href="{{ site.url }}{{ site.baseurl }}"
        class="text-2xl font-bold gradient-text tracking-tight"
      >
        {{ site.title }}
      </a>
      <div class="hidden md:flex items-center space-x-8">
        {% for item in site.data.settings.menu %}
        <a
          href="{{ item.file | absolute_url }}"
          class="text-slate-300 hover:text-teal-400 transition-colors font-medium text-sm uppercase tracking-wider"
          {%
          if
          item.file
          and
          item.name
          !="About"
          and
          item.name
          !="Publications"
          %}target="_blank"
          {%
          endif
          %}
        >
          {{ item.name }}
        </a>
        {% endfor %}
      </div>
      <button class="md:hidden text-slate-300" onclick="toggleMobileMenu()">
        <i class="fas fa-bars text-xl"></i>
      </button>
    </div>
    <div id="mobile-menu" class="hidden md:hidden mt-4 space-y-3 pb-2">
      {% for item in site.data.settings.menu %}
      <a
        href="{{ item.file | absolute_url }}"
        class="block text-slate-300 hover:text-teal-400 transition-colors text-sm uppercase tracking-wider"
        {%
        if
        item.file
        and
        item.name
        !="About"
        and
        item.name
        !="Publications"
        %}target="_blank"
        {%
        endif
        %}
      >
        {{ item.name }}
      </a>
      {% endfor %}
    </div>
  </div>
</nav>
<script>
  function toggleMobileMenu() {
    const menu = document.getElementById("mobile-menu");
    menu.classList.toggle("hidden");
  }
</script>
